<div class="about-page">
  <header class="about-header">
    <h1 class="about-title">{{ i18n.copy().about.title }}</h1>
    <p class="about-subtitle">{{ i18n.copy().about.subtitle }}</p>
  </header>

  <p-card class="about-card">
    <div class="card-content">
      @for (paragraph of i18n.copy().about.paragraphs; track paragraph; let first = $first) {
      <p [class.about-lead]="first">{{ paragraph }}</p>
      }
    </div>

    <ng-template pTemplate="footer">
      <div class="about-actions" role="group" aria-label="Social links">
        <a [href]="githubUrl()" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
          <p-button label="GitHub" icon="pi pi-github"></p-button>
        </a>
        <a [href]="linkedinUrl()" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
          <p-button label="LinkedIn" icon="pi pi-linkedin"></p-button>
        </a>
      </div>
    </ng-template>
  </p-card>
</div>
